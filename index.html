<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funeral Home Palermo | International Repatriation Services</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --oro: #c5a059;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-light: #f4f4f4;
        }

        body { margin: 0; font-family: 'Raleway', sans-serif; background: var(--bg-dark); color: var(--text-light); line-height: 1.6; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; color: var(--oro); text-transform: uppercase; text-align: center; }

        /* LANGUAGE SWITCHER */
        .lang-switch {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: flex; gap: 10px;
        }
        .lang-btn {
            background: rgba(0,0,0,0.6); border: 1px solid var(--oro); color: var(--oro);
            padding: 5px 12px; cursor: pointer; border-radius: 4px; font-weight: bold;
        }
        .lang-btn.active { background: var(--oro); color: black; }

        /* HERO */
        .hero {
            min-height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(18,18,18,1)), 
                        url('https://images.unsplash.com/photo-1516962080544-eac695c93791?auto=format&fit=crop&q=80&w=1600') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 20px;
        }
        .logo-img { width: 100%; max-width: 600px; height: auto; margin-bottom: 20px; }

        section { padding: 40px 20px; max-width: 1100px; margin: auto; }

        .disclaimer-prezzi {
            background: rgba(197, 160, 89, 0.1); border: 2px solid var(--oro);
            padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 30px;
        }

        /* CONFIGURATORE */
        .configuratore { background: var(--card-bg); padding: 30px; border-radius: 8px; border: 1px solid #333; }
        .step { margin-bottom: 25px; border-bottom: 1px solid #2a2a2a; padding-bottom: 15px; }
        label { display: block; margin-bottom: 10px; color: var(--oro); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        
        select, input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }

        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; }
        .check-item { background: #2a2a2a; padding: 10px; border-radius: 4px; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }

        #totale-box { font-size: 2.5rem; text-align: center; margin: 20px 0; color: var(--oro); font-family: 'Playfair Display', serif; }

        .btn-whatsapp { 
            background: #25D366; color: white; padding: 20px; border: none; border-radius: 4px; 
            width: 100%; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .map-container { width: 100%; height: 400px; border-radius: 8px; overflow: hidden; border: 1px solid var(--oro); margin-top: 20px; }
        footer { text-align: center; padding: 40px; background: #0a0a0a; border-top: 1px solid #222; }

        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 30px; z-index: 100; }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLanguage('it')">IT</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
    </div>

    <div class="hero">
        <img src="https://i.imgur.com/XL1pSuM.jpeg" alt="Logo" class="logo-img">
        <h1 id="hero-title">Funeral Home Palermo</h1>
        <p id="hero-sub">Via Giuseppe Mancino 31, Palermo - Reperibilità 24h</p>
    </div>

    <section>
        <h2 id="section-title">Preventivo Istantaneo</h2>
        
        <div class="disclaimer-prezzi">
            <h3 id="disc-title">⚠️ NOTA</h3>
            <p id="disc-text">PREZZI ESCLUSI DI SPESE CIMITERIALI E TASSE COMUNALI</p>
        </div>

        <div class="configuratore">
            <div class="step">
                <label id="lbl-rito">Tipo di Rito</label>
                <select id="rito" onchange="calcola()">
                    <option value="0" data-it="Religioso" data-en="Religious Service">Religioso</option>
                    <option value="0" data-it="Civile" data-en="Civil Service">Civile</option>
                </select>
            </div>

            <div class="step">
                <label id="lbl-dest">Destinazione</label>
                <select id="servizio" onchange="calcola()">
                    <option value="1600" data-it="Cremazione" data-en="Cremation">Cremazione - €1600</option>
                    <option value="1900" data-it="Inumazione" data-en="Burial">Inumazione - €1900</option>
                    <option value="2500" data-it="Rientro Internazionale" data-en="International Repatriation">Rientro Internazionale - €2500</option>
                </select>
            </div>

            <div class="step">
                <label id="lbl-bara">Cofano (Bara)</label>
                <select id="bara" onchange="calcola()">
                    <option value="600" data-it="Base" data-en="Standard Wood">Base - €600</option>
                    <option value="1300" data-it="Elegante" data-en="Elegant Wood">Elegante - €1300</option>
                    <option value="4500" data-it="Lusso" data-en="Luxury Casket">Lusso - €4500</option>
                </select>
            </div>

            <div class="step">
                <label id="lbl-extra">Servizi Extra</label>
                <div class="checkbox-grid">
                    <div class="check-item"><input type="checkbox" value="350" class="extra" data-it="Auto Lusso" data-en="Luxury Hearse" onchange="calcola()"> <span class="ext-txt">Auto Lusso (+€350)</span></div>
                    <div class="check-item"><input type="checkbox" value="200" class="extra" data-it="Pratiche" data-en="Paperwork" onchange="calcola()"> <span class="ext-txt">Pratiche (+€200)</span></div>
                    <div class="check-item"><input type="checkbox" value="150" class="extra" data-it="Fiori" data-en="Flowers" onchange="calcola()"> <span class="ext-txt">Fiori (+€150)</span></div>
                    <div class="check-item"><input type="checkbox" value="300" class="extra" data-it="Zinco Interno" data-en="Zinc Liner (for flights)" onchange="calcola()"> <span class="ext-txt">Zinco (Voli) (+€300)</span></div>
                </div>
            </div>

            <div id="totale-box">Total: €0</div>
            <input type="text" id="nome" placeholder="Nome / Name">
            <button class="btn-whatsapp" onclick="inviaWhatsApp()">SEND TO WHATSAPP</button>
        </div>
    </section>

    <section>
        <h2 id="map-title">Dove Siamo</h2>
        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d784.8736984627776!2d13.351919269637492!3d38.10542175352812!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1319ef7b78be2469%3A0x8faed4c04bb7d8f1!2sFuneral%20Home%20Palermo!5e0!3m2!1sit!2sit!4v1774383849400!5m2!1sit!2sit" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

    <a href="https://wa.me/393343484670" class="whatsapp-float">💬</a>

    <script>
        let currentLang = 'it';
        let totale = 0;

        const translations = {
            it: {
                heroTitle: "Funeral Home Palermo", heroSub: "Via G. Mancino 31 - Reperibilità 24h",
                sectTitle: "Preventivo Istantaneo", discTitle: "⚠️ NOTA", discText: "PREZZI ESCLUSI DI SPESE CIMITERIALI E TASSE",
                lblRito: "Tipo di Rito", lblDest: "Destinazione", lblBara: "Cofano", lblExtra: "Extra",
                mapTitle: "Dove Siamo", btnWA: "INVIA SU WHATSAPP", placeholder: "Tuo Nome"
            },
            en: {
                heroTitle: "Palermo Funeral Home", heroSub: "Via G. Mancino 31 - 24/7 Availability",
                sectTitle: "Instant Quote", discTitle: "⚠️ NOTE", discText: "PRICES EXCLUDE CEMETERY FEES AND LOCAL TAXES",
                lblRito: "Service Type", lblDest: "Destination", lblBara: "Casket", lblExtra: "Extras",
                mapTitle: "Location", btnWA: "SEND TO WHATSAPP", placeholder: "Your Name"
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('hero-title').innerText = translations[lang].heroTitle;
            document.getElementById('hero-sub').innerText = translations[lang].heroSub;
            document.getElementById('section-title').innerText = translations[lang].sectTitle;
            document.getElementById('disc-title').innerText = translations[lang].discTitle;
            document.getElementById('disc-text').innerText = translations[lang].discText;
            document.getElementById('lbl-rito').innerText = translations[lang].lblRito;
            document.getElementById('lbl-dest').innerText = translations[lang].lblDest;
            document.getElementById('lbl-bara').innerText = translations[lang].lblBara;
            document.getElementById('lbl-extra').innerText = translations[lang].lblExtra;
            document.getElementById('map-title').innerText = translations[lang].mapTitle;
            document.querySelector('.btn-whatsapp').innerText = translations[lang].btnWA;
            document.getElementById('nome').placeholder = translations[lang].placeholder;
            calcola();
        }

        function calcola() {
            let s = document.getElementById('servizio');
            let b = document.getElementById('bara');
            let valS = parseInt(s.value);
            let valB = parseInt(b.value);
            let extraTot = 0;
            document.querySelectorAll('.extra:checked').forEach(e => extraTot += parseInt(e.value));
            
            totale = valS + valB + extraTot;
            document.getElementById('totale-box').innerText = "Total: €" + totale;
        }

        function inviaWhatsApp() {
            let nome = document.getElementById('nome').value;
            let msg = `Richiesta da sito (${currentLang}): Total €${totale} - Cliente: ${nome}`;
            window.open(`https://wa.me/393343484670?text=${encodeURIComponent(msg)}`);
        }
        window.onload = calcola;
    </script>
</body>
</html>
