<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funeral Home Palermo | Servizi Funebri H24 in Tutta la Sicilia</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --oro: #c5a059;
            --oro-scuro: #a38241;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-light: #f4f4f4;
            --text-dim: #b0b0b0;
            --border-color: #333;
            --whatsapp-green: #25D366;
            --whatsapp-hover: #1da851;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Raleway', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            color: var(--oro);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* --- Header & Hero --- */
        .header-top {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 1000;
        }

        .contact-top { font-size: 0.95rem; color: var(--oro); font-weight: 600; }
        .lang-switch { display: flex; gap: 10px; }
        .lang-btn {
            background: #000; border: 1px solid var(--oro); color: var(--oro);
            padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold;
        }
        .lang-btn.active { background: var(--oro); color: #000; }

        .hero {
            min-height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(18,18,18,1)), 
                        url('https://i.imgur.com/XL1pSuM.jpeg') center/cover no-repeat;
            display: flex; justify-content: center; align-items: center; padding: 40px;
        }
        .logo-img { width: 100%; max-width: 600px; filter: drop-shadow(0 0 15px rgba(0,0,0,0.8)); }

        /* --- Main Content --- */
        main { padding: 40px 20px; max-width: 1000px; margin: auto; }

        .section-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .fleet-text { text-align: center; margin-bottom: 20px; }

        /* --- Form Elements --- */
        .form-group { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        label { display: block; margin-bottom: 10px; color: var(--oro); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        
        select, input {
            width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444;
            color: white; border-radius: 4px; font-size: 1rem;
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }

        .qty-input-group { display: flex; align-items: center; gap: 15px; }
        .qty-input-group input { width: 100px; text-align: center; }

        .checkbox-item {
            background: #2a2a2a; padding: 12px; border-radius: 4px;
            display: flex; align-items: center; gap: 10px; margin-top: 10px;
            border: 1px solid #444;
        }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--oro); }

        #totale-box {
            font-size: 3rem; text-align: center; margin: 30px 0; color: var(--oro);
            font-family: 'Playfair Display', serif; background: #1a1a1a;
            padding: 20px; border: 2px solid var(--oro); border-radius: 8px;
        }

        .btn-whatsapp {
            background: var(--whatsapp-green); color: white; padding: 20px;
            border: none; border-radius: 4px; width: 100%; font-weight: bold;
            cursor: pointer; font-size: 1.1rem; text-transform: uppercase;
        }

        footer { text-align: center; padding: 40px; background: #000; color: var(--text-dim); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="header-top">
        <div class="contact-top">📞 091 6378825 | 📱 334 3484670 (H24)</div>
        <div class="lang-switch">
            <button class="lang-btn active" id="btn-it" onclick="setLanguage('it')">IT</button>
            <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">EN</button>
        </div>
    </div>

    <div class="hero">
        <img src="https://i.imgur.com/XL1pSuM.jpeg" alt="Logo Funeral Home" class="logo-img">
    </div>

    <main>
        <section class="section-box">
            <div class="fleet-text">
                <h2 id="fleet-title">La Nostra Flotta</h2>
                <p id="fleet-desc">Eccellenza e decoro con mezzi Mercedes-Benz e Maserati.</p>
            </div>
        </section>

        <section class="section-box">
            <h2 id="quote-title">Preventivo Istantaneo</h2>
            
            <div class="form-group">
                <label id="l-tipo">Tipologia Funerale</label>
                <select id="funerale" onchange="toggleCofani(); calcolaTotal();">
                    <option value="1500" data-it="Inumazione" data-en="Inhumation">Inumazione - €1500</option>
                    <option value="1850" data-it="Tumulazione" data-en="Entombment">Tumulazione - €1850</option>
                    <option value="1750" data-it="Cremazione Palermo" data-en="Cremation Palermo">Cremazione Palermo - €1750</option>
                    <option value="2200" data-it="Cremazione Delia" data-en="Cremation Delia">Cremazione Delia - €2200</option>
                </select>
            </div>

            <div class="form-group">
                <label id="l-cofano">Cofano (Bara)</label>
                <select id="bara" onchange="calcolaTotal()"></select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label id="l-fiori">Fiori (Pezzi)</label>
                    <div class="qty-input-group">
                        <input type="number" id="flower-count" value="0" min="0" onchange="calcolaTotal()">
                        <span>€150 cad.</span>
                    </div>
                </div>
                <div class="form-group">
                    <label id="l-luttini">Luttini (Quantità)</label>
                    <div class="qty-input-group">
                        <input type="number" id="luttini-count" value="0" min="0" onchange="calcolaTotal()">
                        <span>€1 cad.</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Extra</label>
                <div class="checkbox-item">
                    <input type="checkbox" id="chk-foto" value="100" onchange="calcolaTotal()">
                    <label for="chk-foto" style="margin:0; color:#fff;">Fotoceramica 9x12 (+€100)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="chk-auto" value="350" onchange="calcolaTotal()">
                    <label for="chk-auto" style="margin:0; color:#fff;">Auto Lusso (+€350)</label>
                </div>
            </div>

            <div id="totale-box">€0</div>
            
            <input type="text" id="nome-cliente" placeholder="Inserisci il tuo nome" style="margin-bottom:20px;">
            <button class="btn-whatsapp" onclick="sendWhatsApp()">Invia su WhatsApp</button>
        </section>
    </main>

    <footer>
        <strong>Funeral Home Palermo</strong>
        Via Giuseppe Mancino 31, Palermo<br>
        H24: 334 3484670
    </footer>

    <script>
        let currentLang = 'it';
        const trans = {
            it: { fleetTitle: "La Nostra Flotta", quoteTitle: "Preventivo Istantaneo", base: "Base", lusso: "Lusso", zinc: "con Zinco" },
            en: { fleetTitle: "Our Fleet", quoteTitle: "Instant Quote", base: "Standard", lusso: "Luxury", zinc: "with Zinc" }
        };

        function setLanguage(l) {
            currentLang = l;
            document.getElementById('fleet-title').innerText = trans[l].fleetTitle;
            document.getElementById('quote-title').innerText = trans[l].quoteTitle;
            toggleCofani();
        }

        function toggleCofani() {
            const tipo = document.getElementById('funerale').value;
            const select = document.getElementById('bara');
            const isTum = (tipo == "1850");
            select.innerHTML = isTum ? 
                `<option value="800">${trans[currentLang].base} ${trans[currentLang].zinc} - €800</option><option value="2300">${trans[currentLang].lusso} ${trans[currentLang].zinc} - €2300</option>` :
                `<option value="500">${trans[currentLang].base} - €500</option><option value="2300">${trans[currentLang].lusso} - €2300</option>`;
            calcolaTotal();
        }

        function calcolaTotal() {
            const funerale = parseInt(document.getElementById('funerale').value);
            const bara = parseInt(document.getElementById('bara').value);
            const fiori = (parseInt(document.getElementById('flower-count').value) || 0) * 150;
            const luttini = (parseInt(document.getElementById('luttini-count').value) || 0) * 1;
            let extra = 0;
            if(document.getElementById('chk-foto').checked) extra += 100;
            if(document.getElementById('chk-auto').checked) extra += 350;

            const totale = funerale + bara + fiori + luttini + extra;
            document.getElementById('totale-box').innerText = `€${totale}`;
        }

        function sendWhatsApp() {
            const nome = document.getElementById('nome-cliente').value;
            if(!nome) { alert("Inserisci il nome"); return; }
            const tot = document.getElementById('totale-box').innerText;
            const msg = `Richiesta Preventivo - Funeral Home Palermo\nCliente: ${nome}\nTotale Stimato: ${tot}`;
            window.open(`https://wa.me/393343484670?text=${encodeURIComponent(msg)}`);
        }

        window.onload = toggleCofani;
    </script>
</body>
</html>
