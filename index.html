<!-- SOCIAL -->
<meta property="og:title" content="Funeral Home Palermo">

</head>

<title>Funeral Home Palermo</title>

<style>
body {
  margin:0;
  font-family: Arial;
  color:white;
}

/* SFONDO */
.hero {
  background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") center/cover;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background-blend-mode: darken;
  background-color: rgba(0,0,0,0.6);
}

/* LOGO */
.logo {
  width:150px;
  margin-bottom:20px;
}

/* TITOLI */
h1 {
  color:gold;
  font-size:40px;
}

h2 {
  color:gold;
  text-align:center;
}

/* SEZIONI */
section {
  padding:50px 20px;
  background:#0c0c1d;
}

/* SERVIZI */
.servizi {
  display:grid;
  gap:20px;
}

.card {
  background:#1a1a3a;
  padding:20px;
  border-radius:10px;
}

/* CONFIGURATORE */
input, select {
  width:100%;
  padding:12px;
  margin-top:10px;
}

button {
  width:100%;
  padding:15px;
  background:gold;
  border:none;
  font-weight:bold;
  margin-top:15px;
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:22px;
}
</style>
</head>

<body>

<div class="hero">
  <img src="https://imgur.com/a/E8ZGSjh" class="logo">
  <h1>Funeral Home Palermo</h1>
  <p>Onoriamo la memoria con dignità</p>
</div>

<section>
  <h2>I Nostri Servizi</h2>
  <div class="servizi">
    <div class="card">Funerali completi a partire da €2000</div>
    <div class="card">Cremazione e servizi dedicati</div>
    <div class="card">Trasporto salme nazionale</div>
    <div class="card">Gestione pratiche burocratiche</div>
  </div>
</section>

<section>
  <h2>Crea il tuo funerale</h2>

  <select id="servizio">
    <option value="2000">Sepoltura - €2000</option>
    <option value="1500">Cremazione - €1500</option>
  </select>

  <select id="bara">
    <option value="500">Bara Base - €500</option>
    <option value="1200">Bara Elegante - €1200</option>
    <option value="3000">Bara Lusso - €3000</option>
  </select>

  <input type="checkbox" value="150" class="extra"> Fiori (€150)<br>
  <input type="checkbox" value="200" class="extra"> Auto extra (€200)<br>

  <button onclick="calcola()">Calcola totale</button>

  <h2 id="totale"></h2>

  <input type="text" id="nome" placeholder="Nome e cognome">
  <input type="tel" id="telefono" placeholder="Telefono">

  <button onclick="inviaWhatsApp()">Invia richiesta</button>
</section>

<section>
  <h2>Contatti</h2>
  <p style="text-align:center;">
    📞 334 348 4670<br>
    📍 Palermo
  </p>
</section>

<a class="whatsapp" href="https://wa.me/393343484670">💬</a>

<script>
let totaleFinale = 0;

function calcola() {
  let servizio = parseInt(document.getElementById("servizio").value);
  let bara = parseInt(document.getElementById("bara").value);

  let extras = document.querySelectorAll(".extra:checked");
  let extraTot = 0;

  extras.forEach(e => extraTot += parseInt(e.value));

  totaleFinale = servizio + bara + extraTot;

  document.getElementById("totale").innerText = "Totale: €" + totaleFinale;
}

function inviaWhatsApp() {
  let nome = document.getElementById("nome").value;
  let telefono = document.getElementById("telefono").value;

  let messaggio = "Nuova richiesta funerale:%0A" +
                  "Nome: " + nome + "%0A" +
                  "Telefono: " + telefono + "%0A" +
                  "Totale: €" + totaleFinale;

  window.open("https://wa.me/393343484670?text=" + messaggio);
}
</script>

</body>
</html>
