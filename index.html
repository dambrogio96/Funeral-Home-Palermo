<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Funeral Home Palermo</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0c0c1d;
  color:white;
}

/* HEADER */
header {
  text-align:center;
  padding:40px 20px;
  background:linear-gradient(#0c0c1d,#1a1a3a);
}

header h1 {
  color:gold;
  margin:0;
}

header p {
  font-style:italic;
}

/* SEZIONI */
section {
  padding:40px 20px;
}

h2 {
  color:gold;
  text-align:center;
}

/* SERVIZI */
.servizi {
  display:grid;
  gap:20px;
}

.box-servizio {
  background:#1a1a3a;
  padding:20px;
  border-radius:10px;
}

/* CONFIGURATORE */
.box {
  margin-bottom:15px;
}

select, input {
  width:100%;
  padding:10px;
}

button {
  width:100%;
  padding:15px;
  background:gold;
  border:none;
  font-weight:bold;
  margin-top:10px;
}

/* WHATSAPP FLOAT */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:green;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:20px;
}
</style>
</head>

<body>

<header>
  <h1>Funeral Home Palermo</h1>
  <p>"Affidati a noi per onorare la memoria con dignità"</p>
</header>

<section>
  <h2>I Nostri Servizi</h2>
  <div class="servizi">
    <div class="box-servizio">Funerali completi</div>
    <div class="box-servizio">Cremazione</div>
    <div class="box-servizio">Trasporto salme</div>
    <div class="box-servizio">Pratiche burocratiche</div>
  </div>
</section>

<section>
  <h2>Crea il tuo funerale</h2>

  <div class="box">
    <select id="servizio">
      <option value="2000">Sepoltura - €2000</option>
      <option value="1500">Cremazione - €1500</option>
    </select>
  </div>

  <div class="box">
    <select id="bara">
      <option value="500">Base - €500</option>
      <option value="1200">Elegante - €1200</option>
      <option value="3000">Lusso - €3000</option>
    </select>
  </div>

  <div class="box">
    <input type="checkbox" value="150" class="extra"> Fiori (€150)<br>
    <input type="checkbox" value="200" class="extra"> Auto extra (€200)<br>
  </div>

  <button onclick="calcola()">Calcola totale</button>

  <h2 id="totale"></h2>

  <input type="text" id="nome" placeholder="Nome">
  <input type="tel" id="telefono" placeholder="Telefono">

  <button onclick="inviaWhatsApp()">Invia richiesta</button>
</section>

<section>
  <h2>Contatti</h2>
  <p style="text-align:center;">
    📞 334 348 4670<br>
    📍 Palermo
  </p>
</section>

<a class="whatsapp" href="https://wa.me/393343484670">💬</a>

<script>
let totaleFinale = 0;

function calcola() {
  let servizio = parseInt(document.getElementById("servizio").value);
  let bara = parseInt(document.getElementById("bara").value);

  let extras = document.querySelectorAll(".extra:checked");
  let extraTot = 0;

  extras.forEach(e => extraTot += parseInt(e.value));

  totaleFinale = servizio + bara + extraTot;

  document.getElementById("totale").innerText = "Totale: €" + totaleFinale;
}

function inviaWhatsApp() {
  let nome = document.getElementById("nome").value;
  let telefono = document.getElementById("telefono").value;

  let messaggio = "Nuova richiesta funerale:%0A" +
                  "Nome: " + nome + "%0A" +
                  "Telefono: " + telefono + "%0A" +
                  "Totale: €" + totaleFinale;

  window.open("https://wa.me/393343484670?text=" + messaggio);
}
</script>

</body>
</html>
